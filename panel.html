<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOCANEX</title>
<style>
html,body{margin:0;padding:0;height:100%;background:#080b12;overflow:hidden;position:relative}
body{background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:40px 40px}
#settings-btn{
  position:fixed;top:10px;right:10px;z-index:9999;
  width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,.08);
  background:rgba(13,17,23,.8);backdrop-filter:blur(4px);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:#4a5a72;transition:color .15s,border-color .15s,background .15s;
}
#settings-btn:hover{color:#00d4aa;border-color:rgba(0,212,170,.25);background:rgba(0,212,170,.06)}
#settings-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
</style>
</head>
<body>
